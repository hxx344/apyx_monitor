rules:
  - rule_id: apxusd_tvl_floor
    description: apxUSD TVL 低于安全线
    entity_id: apxusd
    metric_name: tvl_usd
    comparator: lt
    threshold: 5000000
    severity: P1
    cooldown_seconds: 900
    required_consecutive_hits: 1
    enabled: true

  - rule_id: apyusd_tvl_floor
    description: apyUSD TVL 低于安全线
    entity_id: apyusd
    metric_name: tvl_usd
    comparator: lt
    threshold: 1000000
    severity: P1
    cooldown_seconds: 900
    required_consecutive_hits: 1
    enabled: true

  - rule_id: apyusd_underlying_apy_floor
    description: apyUSD 底层 APY 低于预期
    entity_id: apyusd
    metric_name: underlying_apy
    comparator: lt
    threshold: 6
    severity: P2
    cooldown_seconds: 1800
    required_consecutive_hits: 1
    enabled: true

  - rule_id: morpho_apyusd_usdc_available_borrow_floor
    description: Morpho apyUSD/USDC 可借款额过低
    entity_id: morpho-apyusd-usdc
    metric_name: available_to_borrow_usd
    comparator: lt
    threshold: 25000
    severity: P1
    cooldown_seconds: 600
    required_consecutive_hits: 1
    enabled: true

  - rule_id: morpho_apyusd_usdc_borrow_apy_ceiling
    description: Morpho apyUSD/USDC 借款利率过高
    entity_id: morpho-apyusd-usdc
    metric_name: borrow_apy
    comparator: gt
    threshold: 4
    severity: P1
    cooldown_seconds: 600
    required_consecutive_hits: 1
    enabled: true

  - rule_id: curve_apyusd_apxusd_rate_deviation_ceiling
    description: Curve apyUSD/apxUSD 汇率偏离净值过大
    entity_id: curve-apyusd-apxusd
    metric_name: curve_rate_vs_nav_deviation_pct
    comparator: gt
    threshold: 1.0
    severity: P1
    cooldown_seconds: 600
    required_consecutive_hits: 1
    enabled: true

  - rule_id: apyx_capped_ratio_deviation_ceiling
    description: Apyx Capped Ratio 脱锚
    entity_id: morpho-apyusd-usdc
    metric_name: capped_collateralization_ratio_deviation_pct
    comparator: gt
    threshold: 0.5
    severity: P1
    cooldown_seconds: 600
    required_consecutive_hits: 1
    enabled: true

  - rule_id: crosschain_arb_edge_opportunity
    description: 闭环跨链套利利润率机会
    entity_id: arb-apyusd-apxusd-crosschain
    metric_name: best_net_edge_pct
    comparator: gt
    threshold: 0.2
    severity: P1
    cooldown_seconds: 300
    required_consecutive_hits: 1
    notify_feishu: true
    enabled: true
